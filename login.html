<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login | Aura 3D - Luxury Custom Gifts</title>
  <meta name="description" content="Log in to your Aura 3D customer account to track your orders, save bespoke 3D design mockups, and coordinate inquiries.">
  <!-- Tailwind CSS 3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            luxuryBlack: '#0D0D0D',
            luxuryCharcoal: '#1A1A1A',
            luxuryCharcoalLight: '#262626',
            luxuryGold: '#D4AF37',
            luxuryGoldLight: '#E5C483',
            luxuryBeige: '#F5F2EB',
            luxuryBeigeDark: '#EAE6DF',
            luxuryLavender: '#E6E6FA',
            luxuryPurple: '#4B0082',
            luxuryPurpleDark: '#2D1E3D',
          }
        }
      }
    }
  </script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body class="bg-luxuryBeige text-luxuryCharcoal dark:bg-luxuryBlack dark:text-gray-100 transition-colors duration-500 overflow-x-hidden flex items-center justify-center min-h-screen py-12">

  <!-- Top Bar Controls (Theme and RTL) -->
  <div class="absolute top-6 right-6 flex items-center space-x-4 z-50">
    <!-- Theme Toggle -->
    <button
      class="theme-toggle flex items-center justify-center h-9 w-9 rounded border border-luxuryGold/30 text-luxuryGold hover:border-luxuryGold hover:bg-luxuryGold/10 transition"
      aria-label="Toggle Theme">
      <span class="theme-icon"></span>
    </button>

    <!-- RTL Toggle -->
    <button
      class="rtl-toggle flex items-center justify-center h-9 px-3 text-xs rounded border border-luxuryGold/30 text-luxuryGold font-mono hover:border-luxuryGold hover:bg-luxuryGold/10 transition"
      aria-label="Toggle RTL">
      <span class="rtl-label">RTL</span>
    </button>
  </div>

  <!-- ==========================================
       MAIN CONTENT (Centered Login Card)
       ========================================== -->
  <main class="w-full max-w-md px-6">
    <div class="glass-card p-8 md:p-12 rounded-3xl border border-luxuryGold/20 shadow-2xl relative">
      <div class="text-center mb-8 flex flex-col items-center">
        <!-- Logo Link -->
        <a href="index.html" class="flex items-center space-x-2 text-xl font-bold tracking-widest text-luxuryGold mb-6">
          <svg class="h-6 w-6 text-luxuryGold rtl-flip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5" />
            <polyline points="12 2 12 22" />
            <polyline points="12 12 22 8.5" />
            <polyline points="12 12 2 8.5" />
          </svg>
          <span>AURA 3D</span>
        </a>
        <span class="text-xs font-mono text-luxuryGold uppercase tracking-widest">Security access</span>
        <h2 class="text-2xl md:text-3xl font-serif text-luxuryCharcoal dark:text-white mt-1">Customer Login</h2>
      </div>

      <form class="space-y-6">
        
        <!-- Email field -->
        <div>
          <label class="block text-xs font-bold tracking-wider text-luxuryGold uppercase mb-2">Email Address *</label>
          <input required type="email" placeholder="" class="w-full bg-transparent border border-luxuryGold/20 rounded p-3 text-sm focus:border-luxuryGold focus:outline-none dark:text-white placeholder-gray-500">
        </div>

        <!-- Password field with Toggle Eye -->
        <div>
          <label class="block text-xs font-bold tracking-wider text-luxuryGold uppercase mb-2">Password *</label>
          <div class="relative flex items-center">
            <input required type="password" placeholder="••••••••" class="w-full bg-transparent border border-luxuryGold/20 rounded p-3 text-sm focus:border-luxuryGold focus:outline-none dark:text-white placeholder-gray-500 pr-10 pl-3">
            
            <!-- Eye Toggle Button -->
            <button type="button" class="password-toggle-btn absolute right-3 focus:outline-none" aria-label="Toggle Password Visibility">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 hover:text-luxuryGold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember me & Forgot row -->
        <div class="flex items-center justify-between text-xs">
          <label class="flex items-center space-x-2 rtl:space-x-reverse cursor-pointer">
            <input type="checkbox" class="accent-luxuryGold h-4 w-4 bg-transparent border border-luxuryGold/20 rounded focus:ring-0">
            <span class="text-gray-500 dark:text-gray-400">Remember Me</span>
          </label>
          <a href="#" class="text-luxuryGold hover:underline">Forgot Password?</a>
        </div>

        <button type="submit" class="w-full py-4 bg-luxuryGold hover:bg-luxuryGoldLight text-luxuryCharcoal font-serif font-bold tracking-widest uppercase rounded transition shadow-xl">
          Login
        </button>
      </form>

      <!-- Or Divider -->
      <div class="relative flex items-center justify-center my-6">
        <div class="border-t border-luxuryGold/10 w-full"></div>
        <span class="absolute px-3 text-[10px] uppercase tracking-widest text-gray-500 bg-luxuryBeige dark:bg-[#121212] font-semibold">Or continue with</span>
      </div>

      <!-- Social Logins -->
      <div class="grid grid-cols-3 gap-4 mb-6">
        <a href="#" class="flex items-center justify-center h-11 rounded border border-luxuryGold/20 hover:border-luxuryGold hover:bg-luxuryGold/10 text-luxuryCharcoal dark:text-gray-300 transition" aria-label="Sign in with Google">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.24 10.285V13.4h6.887C18.2 15.614 15.645 18 12.24 18c-3.86 0-7-3.14-7-7s3.14-7 7-7c1.7 0 3.3.6 4.5 1.7l2.4-2.4C17.3 1.7 14.9 1 12.24 1a10 10 0 1010 10c0-.75-.075-1.5-.2-2.25H12.24z"/>
          </svg>
        </a>
        <a href="#" class="flex items-center justify-center h-11 rounded border border-luxuryGold/20 hover:border-luxuryGold hover:bg-luxuryGold/10 text-luxuryCharcoal dark:text-gray-300 transition" aria-label="Sign in with Facebook">
          <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </a>
        <a href="#" class="flex items-center justify-center h-11 rounded border border-luxuryGold/20 hover:border-luxuryGold hover:bg-luxuryGold/10 text-luxuryCharcoal dark:text-gray-300 transition" aria-label="Sign in with Apple">
          <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-.96.04-2.13.64-2.82 1.45-.6.7-1.13 1.84-.99 2.94.99.08 2.16-.52 2.82-1.33z"/>
          </svg>
        </a>
      </div>

      <p class="text-center text-xs text-gray-500">
        Don't have a profile yet? <a href="signup.html" class="text-luxuryGold hover:underline">Create Account</a>
      </p>
    </div>
  </main>

  <!-- Core Scripts -->
  <script src="assets/js/main.js"></script>
</body>
</html>
